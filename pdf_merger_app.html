
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<h2 class="sr-only">複数のPDFファイルをひとつに結合するウェブアプリ</h2>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); color: var(--color-text-primary); }
#drop-zone {
  border: 1.5px dashed var(--color-border-secondary);
  border-radius: var(--border-radius-lg);
  padding: 2.5rem 1.5rem;
  text-align: center;
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 1.25rem;
}
#drop-zone.drag-over { background: var(--color-background-secondary); }
#drop-zone input { display: none; }
.drop-icon {
  width: 40px; height: 40px; margin: 0 auto 0.75rem;
  border: 1.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
#drop-zone .main-text { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
#drop-zone .sub-text { font-size: 13px; color: var(--color-text-secondary); }
#file-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }
.file-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  padding: 10px 12px;
  cursor: grab;
  user-select: none;
  transition: background 0.1s, opacity 0.1s;
}
.file-item:active { cursor: grabbing; }
.file-item.dragging { opacity: 0.4; }
.file-item.drag-target { background: var(--color-background-secondary); }
.drag-handle { color: var(--color-text-secondary); font-size: 14px; flex-shrink: 0; }
.file-icon {
  width: 32px; height: 32px; border-radius: 6px;
  background: #E6F1FB; display: flex; align-items: center;
  justify-content: center; font-size: 12px; font-weight: 500;
  color: #0C447C; flex-shrink: 0;
}
.file-name { flex: 1; font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-size { font-size: 12px; color: var(--color-text-secondary); flex-shrink: 0; }
.file-pages { font-size: 12px; color: var(--color-text-secondary); flex-shrink: 0; min-width: 52px; text-align: right; }
.remove-btn {
  background: none; border: none; cursor: pointer; padding: 2px 4px;
  color: var(--color-text-secondary); font-size: 16px; flex-shrink: 0;
  border-radius: 4px; line-height: 1;
  transition: color 0.15s, background 0.15s;
}
.remove-btn:hover { color: var(--color-text-primary); background: var(--color-background-secondary); }
.actions { display: flex; gap: 8px; align-items: center; }
#merge-btn {
  flex: 1; padding: 11px 18px; border-radius: var(--border-radius-md);
  background: var(--color-text-primary); color: var(--color-background-primary);
  border: none; font-size: 14px; font-weight: 500; cursor: pointer;
  transition: opacity 0.15s;
}
#merge-btn:hover { opacity: 0.85; }
#merge-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#clear-btn {
  padding: 11px 14px; border-radius: var(--border-radius-md);
  background: none; border: 0.5px solid var(--color-border-secondary);
  font-size: 13px; color: var(--color-text-secondary); cursor: pointer;
  transition: background 0.15s;
}
#clear-btn:hover { background: var(--color-background-secondary); }
#status { font-size: 13px; color: var(--color-text-secondary); margin-top: 0.75rem; min-height: 20px; }
#progress-bar-wrap {
  width: 100%; height: 3px; background: var(--color-border-tertiary);
  border-radius: 2px; margin-top: 8px; overflow: hidden; display: none;
}
#progress-bar { height: 100%; width: 0%; background: var(--color-text-primary); transition: width 0.2s; border-radius: 2px; }
.summary-bar {
  display: flex; gap: 16px; padding: 10px 14px;
  background: var(--color-background-secondary);
  border-radius: var(--border-radius-md);
  margin-bottom: 1.25rem;
  font-size: 13px; color: var(--color-text-secondary);
}
.summary-bar span { color: var(--color-text-primary); font-weight: 500; }
</style>
<div style="padding: 1rem 0; max-width: 560px; margin: 0 auto;">
  <div id="drop-zone">
    <input type="file" id="file-input" accept=".pdf" multiple>
    <div class="drop-icon">📄</div>
    <div class="main-text">PDFファイルをドロップ、またはクリックして追加</div>
    <div class="sub-text">複数ファイルを選択できます。順番はドラッグで変更できます。</div>
  </div>
  <div id="summary-bar" class="summary-bar" style="display:none;">
    <div>ファイル数 <span id="s-files">0</span></div>
    <div>合計ページ数 <span id="s-pages">0</span></div>
    <div>合計サイズ <span id="s-size">0 KB</span></div>
  </div>
  <div id="file-list"></div>
  <div class="actions" id="actions" style="display:none;">
    <button id="merge-btn">結合してダウンロード</button>
    <button id="clear-btn">すべて削除</button>
  </div>
  <div id="status"></div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
</div>
<script>
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const fileList = document.getElementById('file-list');
const mergeBtn = document.getElementById('merge-btn');
const clearBtn = document.getElementById('clear-btn');
const status = document.getElementById('status');
const actions = document.getElementById('actions');
const summaryBar = document.getElementById('summary-bar');
const pbWrap = document.getElementById('progress-bar-wrap');
const pb = document.getElementById('progress-bar');

let files = [];
let dragSrcIdx = null;

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return Math.round(b/1024) + ' KB';
  return (b/1024/1024).toFixed(1) + ' MB';
}

async function getPageCount(file) {
  try {
    const buf = await file.arrayBuffer();
    const pdf = await PDFLib.PDFDocument.load(buf, {ignoreEncryption: true});
    return pdf.getPageCount();
  } catch { return '?'; }
}

async function addFiles(newFiles) {
  for (const f of newFiles) {
    if (!f.name.toLowerCase().endsWith('.pdf')) continue;
    const pages = await getPageCount(f);
    files.push({ file: f, pages });
  }
  render();
}

function render() {
  fileList.innerHTML = '';
  files.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'file-item';
    div.draggable = true;
    div.dataset.idx = i;
    div.innerHTML = `
      <div class="drag-handle">⠿</div>
      <div class="file-icon">PDF</div>
      <div class="file-name" title="${item.file.name}">${item.file.name}</div>
      <div class="file-size">${fmtSize(item.file.size)}</div>
      <div class="file-pages">${item.pages} ページ</div>
      <button class="remove-btn" data-idx="${i}" title="削除">×</button>
    `;
    div.addEventListener('dragstart', e => { dragSrcIdx = i; div.classList.add('dragging'); });
    div.addEventListener('dragend', () => { div.classList.remove('dragging'); document.querySelectorAll('.file-item').forEach(el => el.classList.remove('drag-target')); });
    div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-target'); });
    div.addEventListener('dragleave', () => div.classList.remove('drag-target'));
    div.addEventListener('drop', e => {
      e.preventDefault();
      div.classList.remove('drag-target');
      if (dragSrcIdx !== null && dragSrcIdx !== i) {
        const moved = files.splice(dragSrcIdx, 1)[0];
        files.splice(i, 0, moved);
        render();
      }
    });
    div.querySelector('.remove-btn').addEventListener('click', e => {
      files.splice(parseInt(e.target.dataset.idx), 1);
      render();
    });
    fileList.appendChild(div);
  });

  const hasFiles = files.length > 0;
  actions.style.display = hasFiles ? 'flex' : 'none';
  summaryBar.style.display = hasFiles ? 'flex' : 'none';
  mergeBtn.disabled = files.length < 2;
  if (hasFiles) {
    document.getElementById('s-files').textContent = files.length;
    const totalPages = files.reduce((a, f) => a + (typeof f.pages === 'number' ? f.pages : 0), 0);
    document.getElementById('s-pages').textContent = totalPages || '—';
    const totalSize = files.reduce((a, f) => a + f.file.size, 0);
    document.getElementById('s-size').textContent = fmtSize(totalSize);
  }
  status.textContent = files.length === 1 ? 'もう1つ以上PDFを追加してください。' : '';
}

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => addFiles(Array.from(e.target.files)));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  addFiles(Array.from(e.dataTransfer.files));
});

clearBtn.addEventListener('click', () => { files = []; render(); status.textContent = ''; });

mergeBtn.addEventListener('click', async () => {
  if (files.length < 2) return;
  mergeBtn.disabled = true;
  clearBtn.disabled = true;
  pbWrap.style.display = 'block';
  pb.style.width = '0%';
  status.textContent = '結合中...';

  try {
    const merged = await PDFLib.PDFDocument.create();
    for (let i = 0; i < files.length; i++) {
      status.textContent = `処理中 (${i+1}/${files.length})：${files[i].file.name}`;
      pb.style.width = Math.round((i / files.length) * 90) + '%';
      const buf = await files[i].file.arrayBuffer();
      const doc = await PDFLib.PDFDocument.load(buf, {ignoreEncryption: true});
      const pages = await merged.copyPages(doc, doc.getPageIndices());
      pages.forEach(p => merged.addPage(p));
    }
    pb.style.width = '95%';
    status.textContent = 'ダウンロードを準備中...';
    const bytes = await merged.save();
    pb.style.width = '100%';
    const blob = new Blob([bytes], {type: 'application/pdf'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'merged.pdf';
    a.click();
    URL.revokeObjectURL(url);
    status.textContent = `結合完了。${files.length} 件のPDFを1つのファイルにまとめました。`;
  } catch(err) {
    status.textContent = 'エラーが発生しました：' + err.message;
  } finally {
    mergeBtn.disabled = files.length < 2;
    clearBtn.disabled = false;
    setTimeout(() => { pbWrap.style.display = 'none'; pb.style.width = '0%'; }, 1500);
  }
});
</script>
